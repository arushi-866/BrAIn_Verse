version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - FRONTEND_URL=http://localhost
    restart: always
    volumes:
      - uploads_volume:/app/uploads

  frontend:
    build:
      context: ./
      dockerfile: frontend.Dockerfile
      args:
        # IMPORTANT: During compilation, this must point to the address of the backend API
        # as resolved from the client's browser (e.g. http://localhost:3001 locally,
        # or https://api.yourdomain.com in production)
        - VITE_API_URL=http://localhost:3001
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  uploads_volume:
